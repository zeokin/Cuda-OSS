name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-import:
    name: lint + import (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint deps
        run: pip install "ruff>=0.4.0" "tomli>=2.0.0; python_version < '3.11'"

      - name: Lint with ruff
        run: ruff check .

      - name: Verify kernel_configs registry imports cleanly
        run: python -c "import kernel_configs; print('ok')"
