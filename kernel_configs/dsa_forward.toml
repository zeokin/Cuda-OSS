[meta]
multi_output = true

test_dtypes = ["bfloat16"]

[[test_sizes]]
label = "tiny"
params = {batch = 1, seq_len_q = 128, seq_len_kv = 128, n_heads = 32, n_heads_kv = 8, head_dim = 128, block_size = 64}

[[test_sizes]]
label = "small"
params = {batch = 2, seq_len_q = 512, seq_len_kv = 512, n_heads = 32, n_heads_kv = 8, head_dim = 128, block_size = 64}

[[test_sizes]]
label = "medium"
params = {batch = 4, seq_len_q = 1024, seq_len_kv = 1024, n_heads = 32, n_heads_kv = 8, head_dim = 128, block_size = 64}

[[test_sizes]]
label = "large"
params = {batch = 4, seq_len_q = 2048, seq_len_kv = 2048, n_heads = 32, n_heads_kv = 8, head_dim = 128, block_size = 64}

[tolerances.bfloat16]
atol = 5e-2
rtol = 5e-2
