rtol = 2e-2

[tolerances.float32]
atol = 1e-4
rtol = 1e-4

[[edge_sizes]]
label = "edge_1023"
params = {M = 1023, N = 1023, K = 1023}

[[edge_sizes]]
label = "edge_4097"
params = {M = 4097, N = 4097, K = 512}
