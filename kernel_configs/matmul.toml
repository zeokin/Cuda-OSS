[meta]
multi_output = false

test_dtypes = ["float16", "bfloat16", "float32"]

[[test_sizes]]
label = "tiny"
params = {M = 128, N = 128, K = 128}

[[test_sizes]]
label = "small"
params = {M = 512, N = 512, K = 512}

[[test_sizes]]
label = "medium"
params = {M = 1024, N = 1024, K = 1024}

[[test_sizes]]
label = "large"
params = {M = 2048, N = 2048, K = 2048}

[[test_sizes]]
label = "xlarge"
params = {M = 4096, N = 4096, K = 4096}

[[test_sizes]]
label = "tall"
params = {M = 8192, N = 1024, K = 1024}

[[test_sizes]]
label = "wide"
params = {M = 1024, N = 8192, K = 1024}

[[test_sizes]]
label = "deep_k"
params = {M = 1024, N = 1024, K = 8192}

[[test_sizes]]
label = "llm_qkv"
params = {M = 4096, N = 4096, K = 512}

[[test_sizes]]
label = "llm_mlp"
params = {M = 4096, N = 11008, K = 4096}

[tolerances.float16]
atol = 1e-2
rtol = 1e-2

[tolerances.bfloat16]
