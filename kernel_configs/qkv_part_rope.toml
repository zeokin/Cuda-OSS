[meta]
multi_output = false

test_dtypes = ["bfloat16"]

[[test_sizes]]
label = "small"
params = {batch = 1, seq_len = 2048, q_heads = 10, kv_heads = 1, head_dim = 256, nope_dim = 192}

[[test_sizes]]
label = "medium"
params = {batch = 2, seq_len = 2048, q_heads = 10, kv_heads = 1, head_dim = 256, nope_dim = 192}

[[test_sizes]]
label = "large"
params = {batch = 2, seq_len = 4096, q_heads = 10, kv_heads = 1, head_dim = 256, nope_dim = 192}

[[test_sizes]]
label = "xlarge"
params = {batch = 4, seq_len = 4096, q_heads = 10, kv_heads = 1, head_dim = 256, nope_dim = 192}

[[test_sizes]]
label = "batch50"
params = {batch = 50, seq_len = 2048, q_heads = 10, kv_heads = 1, head_dim = 256, nope_dim = 192}

[tolerances.bfloat16]
atol = 1e-2
rtol = 1e-2
