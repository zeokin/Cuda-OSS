[meta]
multi_output = false

test_dtypes = ["bfloat16", "float16"]

[[test_sizes]]
label = "tiny"
params = {M = 32, N = 128}

[[test_sizes]]
label = "small"
params = {M = 256, N = 768}

[[test_sizes]]
label = "medium"
params = {M = 1024, N = 1024}

[[test_sizes]]
label = "large"
params = {M = 4096, N = 4096}

[[test_sizes]]
label = "llm_7b"
params = {M = 2048, N = 4096}

[[test_sizes]]
label = "llm_13b"
params = {M = 2048, N = 5120}

[tolerances.float16]
atol = 1e-2
rtol = 1e-2

[tolerances.bfloat16]
atol = 1e-1
rtol = 5e-2

[[edge_sizes]]
label = "edge_1023"
params = {M = 1023, N = 768}

[[edge_sizes]]
label = "edge_4097"
params = {M = 4097, N = 1024}
